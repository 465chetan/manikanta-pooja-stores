name: 🚀 Auto Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Live Server
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 📤 Deploy via FTP to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: manikantapoojastore.com
          username: chethan@manikantapoojastore.com
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            deploy_update.zip
            deploy_images_webp.zip
            convert_webp.php
            test_db.php
