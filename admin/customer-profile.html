    :root { --admin-sidebar: 240px; --admin-primary: #8b5a2b; --admin-accent: #fb923c; }
    *{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5}
    .admin-layout{display:flex;min-height:100vh}
    .admin-sidebar {width:var(--admin-sidebar);background: var(--admin-primary);color: #fffdf5;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
    .admin-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:14px;background: #991b1b}
    .admin-logo .icon { width: 44px; height: 44px; background: linear-gradient(135deg, #fb923c, #f97316); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white !important; font-size: 24px; box-shadow: 0 4px 15px rgba(251, 146, 60, 0.35); flex-shrink: 0; }
    .admin-logo h1 {font-size:1.05rem;font-weight:800;margin:0;color: white;line-height:1.1;letter-spacing:.5px;text-transform:uppercase}
    .admin-logo h1 span{color:#f97316}

    .admin-nav{padding:12px 0}
    .admin-nav-label{padding:10px 16px 4px;font-size:.6rem;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.3)}

    .admin-nav-link i{width:16px;font-size:13px}
    .admin-main{margin-left:var(--admin-sidebar);flex:1}
    .admin-topbar{background:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:50}
    .admin-topbar-title{font-size:1.1rem;font-weight:700;color:var(--admin-primary);display:flex;align-items:center;gap:10px}
    .back-btn{background:#f3f4f6;color:#374151;border:none;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;text-decoration:none}

    .admin-table td{padding:14px 16px;border-bottom:1px solid #f0f0f0;vertical-align:top}
    .admin-table tr:last-child td{border-bottom:none}
    .admin-table tr:hover td{background:#fafafa}

    .info-value{font-weight:600;font-size:.95rem;color:#1e1e2d}
    .info-sub{color:#6b7280;font-size:.8rem;margin-top:2px}
  
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    /* ── Custom Theme Overrides for Calm & Classic Feel ── */
    :root {
      --admin-sidebar: 240px;
      --admin-primary: #decbb7; /* Very Light Warm Biscuit/Brown */
      --admin-accent: #f08b43;  /* Peaceful Light Orange */
      --admin-accent-hover: #d9742e;
      --admin-bg: #F7F5EE;      /* Soft Serene Cream Page Background */
      --admin-card-bg: #ffffff; /* Crisp White for Content Cards */

      --text-muted: #8a7366;    /* Muted Soft Brown Text */
      --sidebar-dark: #f8cca7;  /* Soft Light Orange for Logo Area */
      --sidebar-text: #4a382e;  /* Dark Text for Light Sidebar */

    }
    
    body {

      color: var(--text-primary) !important;
    }
    
    /* Force warm coffee brown color on all general text, titles, details, and labels */
    body, h1, h2, h3, h4, h5, h6, p, td, th, label, input, select, textarea, 
    .topbar-title, .admin-topbar-title, .info-row .val, .pay-row .pv,

    #today-orders, #week-orders, #month-orders, #year-orders,
    #s-total, #s-delivered, #s-shipped, #s-cancelled, #s-revenue, #s-products {
      color: var(--text-primary) !important;
    }
    
    .admin-sidebar {
      background: var(--admin-primary) !important;
      border-right: 1px solid var(--admin-border) !important;
      color: var(--sidebar-text) !important;
    }
    
    .admin-logo {
      background: var(--sidebar-dark) !important;
      border-bottom: 2px solid #e6a100 !important; /* Elegant Gold dividing line */
    }
    
    .admin-logo h1 {
      color: var(--text-primary) !important;
    }
    
    .admin-logo h1 span {
      color: #d4af37 !important; /* Rich Antique Gold for brand name */
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }
    
    .admin-logo .icon {
      background: linear-gradient(135deg, var(--admin-accent), #ffd700) !important; /* Saffron Orange to Gold Gradient */
      box-shadow: 0 4px 15px rgba(240, 139, 67, 0.25) !important;
    }
    
    .admin-logo p {
      color: var(--text-muted) !important;
    }
    
    .admin-nav-label, .nav-label {
      color: #b84c05 !important; /* Rich Dark Saffron Orange */

      font-weight: 800 !important;
      letter-spacing: 1.5px !important;

    }
    
    .admin-nav-link i, .nav-link i {

    }

    .admin-nav-link:hover i, .admin-nav-link.active i,

<script src="../js/auth.js?v=26"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    if (!AdminAPI.requireLogin()) return;
    
    const urlParams = new URLSearchParams(window.location.search);
    const customerId = urlParams.get('id');
    
    if (!customerId) {
      document.getElementById('profile-container').innerHTML = '<div class="alert alert-danger" style="padding:20px;color:red">No customer ID provided in URL.</div>';
      return;
    }
    
    await loadCustomerProfile(customerId);
  } catch (err) {
    document.getElementById('profile-container').innerHTML = `<div style="padding:40px;color:red;font-weight:bold;white-space:pre-wrap">FATAL ERROR:\n${err.message}\n${err.stack}</div>`;
  }
});

async function loadCustomerProfile(id) {
  const container = document.getElementById('profile-container');
  try {
    const res = await AdminAPI._req(`admin/customers/detail.php?id=${id}`);
    
    if (!res.success) {
      container.innerHTML = `<div class="alert alert-danger" style="background:#fee2e2;color:#b91c1c;padding:16px;border-radius:8px">Failed to load customer profile: ${res.message}</div>`;
      return;
    }
  
  const c = res.customer;
  const orders = res.orders;
  
  let ordersHtml = '';
  if (!orders || orders.length === 0) {
    ordersHtml = '<tr><td colspan="4" style="text-align:center;padding:40px;color:#9ca3af">No orders found for this customer.</td></tr>';
  } else {
    ordersHtml = orders.map(o => {
      let statusColor = '#6b7280', statusBg = '#f3f4f6';
      if(o.order_status === 'delivered') { statusColor = '#15803d'; statusBg = '#dcfce7'; }
      else if(o.order_status === 'cancelled') { statusColor = '#b91c1c'; statusBg = '#fee2e2'; }
      else if(o.order_status === 'shipped') { statusColor = '#0369a1'; statusBg = '#e0f2fe'; }
      else if(o.order_status === 'processing') { statusColor = '#a16207'; statusBg = '#fef08a'; }
      
      let paymentColor = o.payment_status === 'paid' ? '#15803d' : '#a16207';
      let paymentBg = o.payment_status === 'paid' ? '#dcfce7' : '#fef08a';
      
      const itemsHtml = o.items.map(i => 
        `<div style="font-size:.85rem;color:#374151;margin-bottom:6px">
           <span style="font-weight:700">1x</span> ${i.name} — <span style="color:#6b7280">₹${Number(i.price).toLocaleString('en-IN')}</span>
         </div>`
      ).join('');
      
      return `
        <tr>
          <td style="font-weight:700;color:var(--admin-primary)">${o.order_number}</td>
          <td style="font-size:.85rem;color:#6b7280">${new Date(o.created_at).toLocaleString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true })}</td>
          <td>${itemsHtml}</td>
          <td>
            <div style="font-weight:700;font-size:1rem;margin-bottom:8px">₹${Number(o.total).toLocaleString('en-IN')}</div>
            <div style="display:inline-block;margin-bottom:6px;padding:4px 10px;border-radius:12px;font-size:.7rem;font-weight:600;background:${paymentBg};color:${paymentColor};text-transform:capitalize">
              ${o.payment_method.toUpperCase()} • ${o.payment_status}
            </div>
            <br>
            <span style="background:${statusBg};color:${statusColor};padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700;text-transform:capitalize">
              ${o.order_status}
            </span>
            <div style="margin-top:12px">
              <a href="order-detail.html?id=${o.id}&v=${Date.now()}" style="display:inline-block;padding:6px 14px;background:#eff6ff;color:#2563eb;border-radius:8px;font-size:.75rem;font-weight:700;text-decoration:none;border:1.5px solid #bfdbfe;transition:all .2s">
                <i class="fas fa-file-invoice"></i> View Full Bill
              </a>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }
  
  container.innerHTML = `
    <!-- Customer Info Card -->
    <div class="admin-card" style="padding: 30px; display: flex; flex-direction: column; gap: 24px;">
      <div style="display: flex; align-items: flex-start; gap: 24px;">
        <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #f97316, #1e1e2d); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 800; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
          ${(c.full_name || 'U').charAt(0).toUpperCase()}
        </div>
        <div style="flex: 1;">
          <h2 style="margin: 0 0 6px 0; font-size: 1.8rem; color: var(--admin-primary); letter-spacing: -0.5px;">${c.full_name || 'Unknown User'}</h2>
          <div style="color: #6b7280; font-size: .95rem; display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
            <span style="background: #f3f4f6; padding: 4px 10px; border-radius: 6px; font-weight: 700; color: #374151; font-size: 0.8rem;">Customer #${c.id}</span>
            <span><i class="far fa-calendar-alt"></i> Joined ${new Date(c.created_at).toLocaleDateString('en-IN', {month:'long', day:'numeric', year:'numeric'})}</span>
          </div>
          <div style="display: flex; gap: 12px;">
            <a href="https://wa.me/91${c.mobile || ''}?text=Hi+${encodeURIComponent(c.full_name || 'User')}" target="_blank" style="display: inline-flex; align-items: center; gap: 8px; background: #25d366; color: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: .85rem; box-shadow: 0 2px 6px rgba(37,211,102,0.3); transition: all 0.2s;">
              <i class="fab fa-whatsapp" style="font-size:1.1rem"></i> Message on WhatsApp
            </a>
          </div>
        </div>
      </div>
      
      <div style="display: flex; flex-wrap: wrap; gap: 40px; padding-top: 24px; border-top: 1px solid #f0f0f0;">
        <div>
          <div style="color: #9ca3af; font-size: .75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 12px;">Contact Information</div>
          <div style="display: flex; flex-direction: column; gap: 10px;">
            <div style="display: flex; align-items: center; gap: 12px; color: #1e1e2d; font-weight: 600; font-size: 0.95rem;">
              <div style="width: 32px; height: 32px; border-radius: 8px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; color: #6b7280;"><i class="fas fa-phone-alt"></i></div>
              +91 ${c.mobile}
            </div>
            <div style="display: flex; align-items: center; gap: 12px; color: #1e1e2d; font-weight: 600; font-size: 0.95rem;">
              <div style="width: 32px; height: 32px; border-radius: 8px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; color: #6b7280;"><i class="fas fa-envelope"></i></div>
              ${c.email || '<span style="color:#9ca3af;font-style:italic;font-weight:400">No email provided</span>'}
            </div>
          </div>
        </div>
        
        <div style="width: 1px; background: #f0f0f0;"></div>
        
        <div>
          <div style="color: #9ca3af; font-size: .75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 12px;">Order Statistics</div>
          <div style="display: flex; gap: 40px;">
            <div>
              <div style="font-size: 1.8rem; font-weight: 800; color: var(--admin-primary); line-height: 1;">${c.order_count}</div>
              <div style="font-size: .8rem; color: #6b7280; margin-top: 6px; font-weight: 600; text-transform: uppercase;">Total Orders</div>
            </div>
            <div>
              <div style="font-size: 1.8rem; font-weight: 800; color: #10b981; line-height: 1;">₹${Number(c.total_spent || 0).toLocaleString('en-IN')}</div>
              <div style="font-size: .8rem; color: #6b7280; margin-top: 6px; font-weight: 600; text-transform: uppercase;">Total Spent</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Order History Card -->
    <div class="admin-card">
      <div class="admin-card-header">
        <i class="fas fa-history" style="color:#9ca3af"></i> Order History
      </div>
      <div style="overflow-x:auto">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:15%">ORDER #</th>
              <th style="width:15%">DATE</th>
              <th style="width:45%">ITEMS</th>
              <th style="width:25%">DETAILS</th>
            </tr>
          </thead>
          <tbody>
            ${ordersHtml}
          </tbody>
        </table>
      </div>
    </div>
    </div>
  `;
  } catch (err) {
    container.innerHTML = `<div style="padding:40px;color:red;font-weight:bold;white-space:pre-wrap">FATAL ERROR:\n${err.message}\n${err.stack}</div>`;
  }
}
</script>
</body>
</html>
