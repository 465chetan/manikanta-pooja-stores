<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Sri Manikanta Pooja Stores</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕉️</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --admin-sidebar: 240px; --admin-primary: #8b5a2b; --admin-accent: #fb923c; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #fffdf5; }
    .admin-layout { display: flex; min-height: 100vh; }
    /* Sidebar */
    .admin-sidebar { width: var(--admin-sidebar); background: var(--admin-primary); color: #fffdf5; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; overflow-y: auto; }
    .admin-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 14px; background: #7a4b22; }
    .admin-logo .icon { width: 44px; height: 44px; background: linear-gradient(135deg, #fb923c, #f97316); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white !important; font-size: 24px; box-shadow: 0 4px 15px rgba(251, 146, 60, 0.35); flex-shrink: 0; }
    .admin-logo h1 { font-size: 1.05rem; font-weight: 800; margin: 0; color: white; line-height: 1.1; letter-spacing: 0.5px; text-transform: uppercase; }
    .admin-logo h1 span { color: #fb923c; }
    .admin-logo p { font-size: 0.65rem; color: #e5d5c5; margin: 0; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; font-weight: 600; }
    .admin-nav { padding: 12px 0; }
    .admin-nav-label { padding: 10px 16px 4px; font-size: .6rem; text-transform: uppercase; letter-spacing: 1.2px; color: #e5d5c5; }
    .admin-nav-link { display: flex; align-items: center; gap: 10px; padding: 11px 16px; color: #fcece0; text-decoration: none; font-size: .85rem; border-left: 3px solid transparent; transition: all .2s; }
    .admin-nav-link:hover, .admin-nav-link.active { background: #7a4b22; color: white; border-left-color: var(--admin-accent); }
    .admin-nav-link i { width: 16px; font-size: 13px; }
    .admin-nav-link .badge { margin-left: auto; background: var(--admin-accent); color: white; font-size: .65rem; padding: 2px 6px; border-radius: 10px; }
    /* Main */
    .admin-main { margin-left: var(--admin-sidebar); flex: 1; }
    .admin-topbar { background: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,.06); position: sticky; top: 0; z-index: 50; }
    .admin-topbar-title { font-size: 1.1rem; font-weight: 700; color: var(--admin-primary); }
    .admin-content { padding: 24px; }
    /* Stats */
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .admin-stat { background: white; border-radius: 12px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,.06); display: flex; align-items: center; gap: 14px; }
    .admin-stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .admin-stat-info .value { font-size: 1.5rem; font-weight: 800; color: var(--admin-primary); line-height: 1; }
    .admin-stat-info .label { font-size: .72rem; color: #6b7280; margin-top: 2px; }
    /* Card */
    .admin-card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 20px; overflow: hidden; }
    .admin-card-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .admin-card-title { font-weight: 700; color: var(--admin-primary); font-size: .95rem; }
    /* Table */
    .admin-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
    .admin-table th { background: #f9fafb; padding: 10px 14px; text-align: left; font-size: .72rem; text-transform: uppercase; letter-spacing: .5px; color: #6b7280; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
    .admin-table td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: #fafafa; }
    .badge-status { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: .7rem; font-weight: 700; text-transform: uppercase; }
    .badge-pending    { background:#fef3c7;color:#92400e; }
    .badge-confirmed  { background:#dbeafe;color:#1e40af; }
    .badge-processing { background:#e0e7ff;color:#3730a3; }
    .badge-shipped    { background:#d1fae5;color:#065f46; }
    .badge-delivered  { background:#d1fae5;color:#065f46; }
    .badge-cancelled  { background:#fee2e2;color:#991b1b; }
    .badge-paid       { background:#d1fae5;color:#065f46; }
    .badge-unpaid     { background:#fef3c7;color:#92400e; }
    .btn-xs { padding: 4px 10px; border-radius: 6px; font-size: .75rem; font-weight: 600; border: none; cursor: pointer; transition: all .2s; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
    .btn-primary-xs { background: var(--admin-primary); color: white; }
    .btn-edit { background: #eff6ff; color: #2563eb; }
    .btn-edit:hover { background: #2563eb; color: white; }
    /* Today highlight */
    .today-banner { background: linear-gradient(135deg, #fb923c, #f97316); box-shadow: 0 10px 25px rgba(251, 146, 60, 0.2); border-radius: 12px; padding: 20px 24px; color: white; margin-bottom: 20px; display: flex; gap: 32px; flex-wrap: wrap; }
    .today-metric .val { font-size: 2rem; font-weight: 800; }
    .today-metric .lbl { font-size: .75rem; color: #fff7ed; }
  
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    /* ── Custom Theme Overrides for Calm & Classic Feel ── */
    :root {
      --admin-sidebar: 240px;
      --admin-primary: #decbb7; /* Very Light Warm Biscuit/Brown */
      --admin-accent: #f08b43;  /* Peaceful Light Orange */
      --admin-accent-hover: #d9742e;
      --admin-bg: #F7F5EE;      /* Soft Serene Cream Page Background */
      --admin-card-bg: #ffffff; /* Crisp White for Content Cards */
      --admin-border: #eadecc;  /* Very Light Brown/Sand Border */
      --text-primary: #4a382e;  /* Grounded Muted Coffee Dark Text */
      --text-muted: #8a7366;    /* Muted Soft Brown Text */
      --sidebar-dark: #f8cca7;  /* Soft Light Orange for Logo Area */
      --sidebar-text: #4a382e;  /* Dark Text for Light Sidebar */
      --sidebar-active-bg: #ecdcc9;
    }
    
    body {
      background: var(--admin-bg) !important;
      color: var(--text-primary) !important;
    }
    
    /* Force warm coffee brown color on all general text, titles, details, and labels */
    body, h1, h2, h3, h4, h5, h6, p, td, th, label, input, select, textarea, 
    .topbar-title, .admin-topbar-title, .info-row .val, .pay-row .pv, 
    .pay-total .pv, .item-name, .item-price, .subtotal-val, 
    .info-value, .value, .admin-card-title, .admin-stat-info .value, .stat-mini .val,
    #today-revenue, #week-revenue, #month-revenue, #year-revenue,
    #today-orders, #week-orders, #month-orders, #year-orders,
    #s-total, #s-delivered, #s-shipped, #s-cancelled, #s-revenue, #s-products {
      color: var(--text-primary) !important;
    }
    
    .admin-sidebar {
      background: var(--admin-primary) !important;
      border-right: 1px solid var(--admin-border) !important;
      color: var(--sidebar-text) !important;
    }
    
    .admin-logo {
      background: var(--sidebar-dark) !important;
      border-bottom: 2px solid #e6a100 !important; /* Elegant Gold dividing line */
    }
    
    .admin-logo h1 {
      color: var(--text-primary) !important;
    }
    
    .admin-logo h1 span {
      color: #d4af37 !important; /* Rich Antique Gold for brand name */
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }
    
    .admin-logo .icon {
      background: linear-gradient(135deg, var(--admin-accent), #ffd700) !important; /* Saffron Orange to Gold Gradient */
      box-shadow: 0 4px 15px rgba(240, 139, 67, 0.25) !important;
    }
    
    .admin-logo p {
      color: var(--text-muted) !important;
    }
    
    .admin-nav-label, .nav-label {
      color: #b84c05 !important; /* Rich Dark Saffron Orange */
      opacity: 1 !important;
      font-weight: 800 !important;
      letter-spacing: 1.5px !important;
    }
    
    .admin-nav-link, .nav-link {
      color: var(--sidebar-text) !important;
      border-left-width: 4px !important;
      transition: all 0.3s ease !important;
      font-weight: 600;
    }
    
    .admin-nav-link i, .nav-link i {
      color: var(--sidebar-text) !important;
    }
    
    .admin-nav-link:hover, .admin-nav-link.active,
    .nav-link:hover, .nav-link.active {
      background: var(--sidebar-active-bg) !important;
      color: var(--text-primary) !important;
      border-left-color: #ffd700 !important; /* Bright Gold indicator on active link */
    }
    
    .admin-nav-link:hover i, .admin-nav-link.active i,
    .nav-link:hover i, .nav-link.active i {
      color: var(--text-primary) !important;
    }
    
    .admin-nav-link .badge, .nav-link .badge {
      background: linear-gradient(135deg, var(--admin-accent), #e6a100) !important; /* Orange-Gold Badge */
      color: white !important;
    }
    
    .admin-topbar, .topbar {
      background: #ffffff !important; /* Clean White Topbar to break cream */
      border-bottom: 1px solid var(--admin-border) !important;
      box-shadow: 0 2px 10px rgba(74, 56, 46, 0.02) !important;
    }
    
    .admin-topbar-title, .topbar-title {
      color: var(--text-primary) !important;
      font-family: 'Segoe UI', system-ui, sans-serif !important;
    }
    
    .admin-content, .content {
      background: var(--admin-bg) !important;
    }
    
    .admin-card, .card {
      background: var(--admin-card-bg) !important;
      border: 1px solid var(--admin-border) !important;
      box-shadow: 0 6px 20px rgba(74, 56, 46, 0.03) !important;
      border-radius: 16px !important;
      overflow: hidden;
      border-top: 3px solid var(--admin-accent) !important; /* Orange top strip */
    }
    
    .admin-card-header, .card-title {
      border-bottom: 1px solid var(--admin-border) !important;
      background: #ffffff !important; /* White background to break cream */
      padding: 16px 24px !important;
      border-left: 4px solid var(--admin-accent) !important; /* Saffron Left Accent Border */
    }
    
    .admin-card-title, .card-title {
      color: var(--text-primary) !important;
      font-weight: 700 !important;
    }
    
    .admin-stat {
      background: var(--admin-card-bg) !important;
      border: 1px solid var(--admin-border) !important;
      box-shadow: 0 6px 20px rgba(74, 56, 46, 0.03) !important;
      border-radius: 16px !important;
      border-bottom: 3px solid var(--admin-accent) !important; /* Saffron Bottom Border */
    }
    
    .admin-stat-icon {
      border-radius: 12px !important;
    }
    
    .admin-table th {
      background: #F5F2EA !important; /* Soft sand-grey table headers */
      color: var(--text-muted) !important;
      border-bottom: 1px solid var(--admin-border) !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.5px !important;
    }
    
    .admin-table td {
      border-bottom: 1px solid #FAF7EE !important;
      color: var(--text-primary) !important;
    }
    
    .admin-table tr:hover td {
      background: rgba(234, 222, 204, 0.15) !important;
    }
    
    .today-banner {
      background: linear-gradient(135deg, var(--admin-accent), #d4af37) !important; /* Elegant Orange-Gold Gradient */
      box-shadow: 0 10px 25px rgba(240, 139, 67, 0.15) !important;
      border-radius: 16px !important;
      color: white !important;
    }
    .today-banner,
    .today-banner *,
    .today-banner div,
    .today-banner span,
    .today-banner #today-orders,
    .today-banner #today-revenue,
    .today-banner #pending-orders,
    .today-banner #total-customers {
      color: #ffffff !important;
    }
    
    .today-metric .lbl {
      color: rgba(255, 255, 255, 0.85) !important;
    }
    
    /* Visited/Details links in orange-gold */
    a {
      color: var(--admin-accent) !important;
    }
    a:hover {
      color: var(--admin-accent-hover) !important;
    }
    
    .back-btn {
      background: #ecdcc9 !important;
      color: var(--text-primary) !important;
      border: 1px solid var(--admin-border) !important;
    }
    .back-btn:hover {
      background: var(--sidebar-dark) !important;
    }
    
    /* Muted Labels should be light brown, not dark */
    .info-row .lbl, .pay-row .pl, .pay-method .pl, .pay-total .pl, .subtotal-lbl,
    .text-muted, .info-label, .admin-logo p {
      color: var(--text-muted) !important;
    }
    
    /* Stats & Historical cards adjustments */
    .admin-card[style*="linear-gradient"], .card[style*="linear-gradient"] {
      background: linear-gradient(135deg, var(--admin-primary), var(--admin-accent)) !important;
    }
    
    .admin-card[style*="linear-gradient"] .admin-card-header, .card[style*="linear-gradient"] .admin-card-header {
      background: transparent !important;
      border: none !important;
    }
    
    .admin-card-header[style*="background"],
    .admin-card-header[style*="linear-gradient"] {
      background: #ffffff !important;
      border-bottom: 1px solid var(--admin-border) !important;
      border-left: 4px solid var(--admin-accent) !important;
    }
    
    .admin-card-header[style*="background"] *,
    .admin-card-header[style*="linear-gradient"] * {
      color: var(--text-primary) !important;
    }
    
    /* Calm status badges */
    .badge-status {
      border-radius: 20px !important;
      font-weight: 700 !important;
      letter-spacing: 0.3px;
    }
    .badge-pending { background: #FCF4DD !important; color: #A06D00 !important; border: 1px solid #F5E5BE !important; }
    .badge-confirmed { background: #E1F8EB !important; color: #157347 !important; border: 1px solid #C3EED3 !important; }
    .badge-processing { background: #EBE8FC !important; color: #433D8B !important; border: 1px solid #D6D0F7 !important; }
    .badge-shipped { background: #E1F8EB !important; color: #157347 !important; border: 1px solid #C3EED3 !important; }
    .badge-delivered { background: #E1F8EB !important; color: #157347 !important; border: 1px solid #C3EED3 !important; }
    .badge-cancelled { background: #FCE8E6 !important; color: #A8201A !important; border: 1px solid #F8D1CE !important; }
    .badge-paid { background: #E1F8EB !important; color: #157347 !important; border: 1px solid #C3EED3 !important; }
    .badge-unpaid { background: #FCF4DD !important; color: #A06D00 !important; border: 1px solid #F5E5BE !important; }
    
    /* Form controls & login page overrides */
    .form-control:focus {
      border-color: var(--admin-accent) !important;
      box-shadow: 0 0 0 3px rgba(240, 139, 67, 0.1) !important;
    }
    
    .login-card {
      background: var(--admin-card-bg) !important;
      border: 1px solid var(--admin-border) !important;
      box-shadow: 0 10px 40px rgba(74, 56, 46, 0.05) !important;
      border-radius: 24px !important;
    }
    
    .login-logo h1 span {
      color: var(--admin-accent) !important;
    }
    
    .btn-submit {
      background: linear-gradient(135deg, var(--admin-accent), #fbb686) !important;
      box-shadow: 0 4px 15px rgba(240, 139, 67, 0.2) !important;
    }
    .btn-submit:hover {
      box-shadow: 0 6px 20px rgba(240, 139, 67, 0.3) !important;
    }
    
    /* Detail Panel Header styling overrides */
    .detail-panel-header {
      background: var(--sidebar-dark) !important; /* Soft light orange background */
      border-bottom: 2px solid var(--admin-border) !important;
    }
    
    .detail-panel-header #detail-order-num,
    .detail-panel-header div,
    .detail-panel-header span,
    .detail-panel-header p {
      color: var(--text-primary) !important; /* Grounded coffee brown text */
    }
    
    /* Target subtext in detail panel header specifically */
    .detail-panel-header div[style*="rgba(255,255,255"] {
      color: var(--text-muted) !important; /* Muted brown instead of white opacity */
    }
    
    .detail-panel-close {
      color: var(--text-primary) !important; /* Coffee brown Close icon */
      opacity: 0.8 !important;
      transition: opacity 0.2s;
    }
    .detail-panel-close:hover {
      opacity: 1 !important;
      background: rgba(74, 56, 46, 0.08) !important; /* Soft dark brown hover backdrop */
    }
    
    /* Hide pending badge when 0 or by default on load */
    #pending-badge {
      display: none;
    }
    
    /* Active Category Tab & Filter Chips */
    .cat-tab.active,
    .filter-chip.active {
      background: var(--admin-accent) !important;
      color: white !important;
      border-color: var(--admin-accent) !important;
    }

    .filter-chip:hover:not(.active) {
      border-color: var(--admin-accent) !important;
      color: var(--admin-accent) !important;
    }

    .search-input:focus {
      border-color: var(--admin-accent) !important;
    }

    /* WhatsApp Buttons: force white text and icon */
    a.btn-wa, a.btn-wa *,
    a.chat-btn, a.chat-btn *,
    .btn-wa-send, .btn-wa-send *,
    a[href*="wa.me"][style*="background"], a[href*="wa.me"][style*="background"] * {
      color: #ffffff !important;
    }

    /* WhatsApp Button Backgrounds */
    a.btn-wa, a.chat-btn {
      background-color: #25d366 !important;
    }
    a.btn-wa:hover, a.chat-btn:hover {
      background-color: #128c7e !important;
    }

    /* Plain text WhatsApp links (not buttons) should be green */
    a[href*="wa.me"]:not(.btn-wa):not(.chat-btn):not([style*="background"]) {
      color: #25d366 !important;
    }
    a[href*="wa.me"]:not(.btn-wa):not(.chat-btn):not([style*="background"]) * {
      color: #25d366 !important;
    }

    /* Google Maps Branded Button */
    a.map-btn, a[href*="google.com/maps"] {
      background: #e8f0fe !important;
      color: #1a73e8 !important;
      border: 1px solid #d2e3fc !important;
    }
    a.map-btn:hover, a[href*="google.com/maps"]:hover {
      background: #d2e3fc !important;
      color: #1a73e8 !important;
    }
    a.map-btn svg, a[href*="google.com/maps"] svg,
    a.map-btn svg path, a[href*="google.com/maps"] svg path {
      fill: #1a73e8 !important;
    }

    /* WhatsApp Section Title (Make Orange) */
    .wa-section-title {
      color: var(--admin-accent) !important;
    }

    /* WhatsApp Msg Bubble Textarea Override */
    textarea.wa-msg-bubble {
      color: #1f2937 !important;
      background: #dcf8c6 !important;
      width: 100% !important;
      border: none !important;
      border-radius: 8px !important;
      padding: 10px 14px !important;
      font-family: inherit !important;
      font-size: 0.82rem !important;
      resize: vertical !important;
      outline: none !important;
      line-height: 1.65 !important;
    }
</style>
</head>
<body>
<div class="admin-layout">
    <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <div class="icon"><i class="fas fa-om" style="font-size: 22px; color: white;"></i></div>
      <div><h1>Sri <span>Manikanta</span></h1><p>Admin Panel</p></div>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-label">Overview</div>
      <a href="dashboard.html" class="admin-nav-link "><i class="fas fa-chart-bar"></i> Dashboard</a>
      <a href="stats.html" class="admin-nav-link active"><i class="fas fa-chart-pie"></i> Stats</a>
      <div class="admin-nav-label">Orders</div>
      <a href="orders.html" class="admin-nav-link "><i class="fas fa-shopping-bag"></i> All Orders <span class="badge" id="pending-badge">0</span></a>
      <div class="admin-nav-label">Catalog</div>
      <a href="products.html" class="admin-nav-link "><i class="fas fa-box"></i> Products</a>
      <a href="products.html?action=add" class="admin-nav-link"><i class="fas fa-plus-circle"></i> Add Product</a>
      <a href="products.html?action=add_category" class="admin-nav-link"><i class="fas fa-tags"></i> Add Category</a>
      <div class="admin-nav-label">Customers</div>
      <a href="customers.html" class="admin-nav-link "><i class="fas fa-users"></i> All Customers</a>
      <div class="admin-nav-label">Store</div>
      <a href="../index.html" target="_blank" class="admin-nav-link"><i class="fas fa-external-link-alt"></i> View Website</a>
      <div style="padding-top:20px">
        <div class="admin-nav-link" style="cursor:pointer;color:#f87171" onclick="AdminAPI.logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar" style="box-shadow:none;border-bottom:1px solid #e5e7eb">
      <div style="display:flex;align-items:center;gap:12px">
        <a href="dashboard.html" style="color:var(--admin-primary);text-decoration:none"><i class="fas fa-arrow-left"></i></a>
        <div class="admin-topbar-title" style="font-size:1.2rem">Orders & Revenue History</div>
      </div>
      <div style="display:flex;gap:16px;color:#374151;font-size:1.1rem;align-items:center">
        <i class="fas fa-search" style="cursor:pointer"></i>
        <i class="fas fa-sliders-h" style="cursor:pointer"></i>
        <i class="fas fa-download" style="cursor:pointer"></i>
      </div>
    </div>



    <div class="admin-content" style="padding:24px;background:#f0f2f5;min-height:100vh">
      
      <!-- Timeframe Metrics -->
      <div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));gap:24px;margin-bottom:32px;">
        <div class="admin-card" style="margin:0;border-left:5px solid #3b82f6;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.04)">
          <div class="admin-card-header" style="border-bottom:none;padding-bottom:0;padding:20px 24px"><div class="admin-card-title" style="font-size:1.05rem;color:#6b7280;text-transform:uppercase;letter-spacing:1px">Today</div></div>
          <div style="padding:0 24px 24px;">
            <div style="font-size:2rem;font-weight:800;color:var(--admin-primary);margin-top:8px" id="today-revenue">—</div>
            <div style="font-size:.95rem;color:#10b981;font-weight:600;margin-top:4px"><i class="fas fa-box"></i> <span id="today-orders">—</span> Orders</div>
          </div>
        </div>
        <div class="admin-card" style="margin:0;border-left:5px solid #8b5cf6;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.04)">
          <div class="admin-card-header" style="border-bottom:none;padding-bottom:0;padding:20px 24px"><div class="admin-card-title" style="font-size:1.05rem;color:#6b7280;text-transform:uppercase;letter-spacing:1px">This Week</div></div>
          <div style="padding:0 24px 24px;">
            <div style="font-size:2rem;font-weight:800;color:var(--admin-primary);margin-top:8px" id="week-revenue">—</div>
            <div style="font-size:.95rem;color:#10b981;font-weight:600;margin-top:4px"><i class="fas fa-box"></i> <span id="week-orders">—</span> Orders</div>
          </div>
        </div>
        <div class="admin-card" style="margin:0;border-left:5px solid #f59e0b;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.04)">
          <div class="admin-card-header" style="border-bottom:none;padding-bottom:0;padding:20px 24px"><div class="admin-card-title" style="font-size:1.05rem;color:#6b7280;text-transform:uppercase;letter-spacing:1px">This Month</div></div>
          <div style="padding:0 24px 24px;">
            <div style="font-size:2rem;font-weight:800;color:var(--admin-primary);margin-top:8px" id="month-revenue">—</div>
            <div style="font-size:.95rem;color:#10b981;font-weight:600;margin-top:4px"><i class="fas fa-box"></i> <span id="month-orders">—</span> Orders</div>
          </div>
        </div>
        <div class="admin-card" style="margin:0;border-left:5px solid #10b981;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.04)">
          <div class="admin-card-header" style="border-bottom:none;padding-bottom:0;padding:20px 24px"><div class="admin-card-title" style="font-size:1.05rem;color:#6b7280;text-transform:uppercase;letter-spacing:1px">This Year</div></div>
          <div style="padding:0 24px 24px;">
            <div style="font-size:2rem;font-weight:800;color:var(--admin-primary);margin-top:8px" id="year-revenue">—</div>
            <div style="font-size:.95rem;color:#10b981;font-weight:600;margin-top:4px"><i class="fas fa-box"></i> <span id="year-orders">—</span> Orders</div>
          </div>
        </div>
      </div>

      <div id="history-container">
        <div style="padding:40px;text-align:center;color:#9ca3af">Loading history...</div>
      </div>
    </div>
  </main>
</div>

<style>
  .month-header { background: #f3f4f6; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; border-top: 1px solid #e5e7eb; }
  .month-title { font-weight: 700; color: #1f2937; font-size: 1rem; }
  .month-total-wrap { text-align: right; display: flex; align-items: center; gap: 8px; }
  .month-total-lbl { font-size: .75rem; color: #6b7280; margin-bottom: 2px; }
  .month-total-val { font-size: 1.05rem; font-weight: 800; color: #059669; }
  .month-arr { width: 24px; height: 24px; border-radius: 50%; background: #e0e7ff; color: #3b82f6; display: flex; align-items: center; justify-content: center; font-size: .75rem; }

  .history-item { padding: 16px 20px; display: flex; align-items: flex-start; gap: 16px; border-bottom: 1px solid #f0f0f0; background: white; transition: background .2s; }
  .history-item:hover { background: #fafafa; }
  
  .h-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; color: #1f2937; flex-shrink: 0; }
  
  .h-body { flex: 1; }
  .h-name { font-weight: 600; font-size: 1.05rem; color: #1f2937; margin-bottom: 2px; }
  .h-date { font-size: .8rem; color: #6b7280; margin-bottom: 8px; }
  .h-badge { display: inline-flex; align-items: center; gap: 4px; background: #d1fae5; color: #065f46; padding: 4px 10px; border-radius: 20px; font-size: .75rem; font-weight: 700; }
  .h-badge i { font-size: .8rem; }
  
  .h-right { text-align: right; flex-shrink: 0; }
  .h-amount { font-size: 1.1rem; font-weight: 700; color: #059669; margin-bottom: 4px; }
  .h-method { font-size: .8rem; color: #6b7280; display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
  .h-method img { width: 14px; height: 14px; border-radius: 50%; }

  /* Colors for avatars */
  .bg-pink { background: #fbcfe8; color: #831843; }
  .bg-orange { background: #fed7aa; color: #7c2d12; }
  .bg-teal { background: #ccfbf1; color: #115e59; }
  .bg-blue { background: #bfdbfe; color: #1e3a8a; }
  .bg-purple { background: #e9d5ff; color: #581c87; }
</style>

<script>document.write('<script src="../js/products.js?t=' + Date.now() + '"><\/script>');</script>
<script src="../js/auth.js?v=35"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!AdminAPI.requireLogin()) return;

  // Fetch Summary Stats
  try {
    const dashRes = await AdminAPI.getDashboard();
    if (dashRes.success) {
      const stats = dashRes.stats || {};
      document.getElementById('today-orders').textContent  = stats.today_orders || 0;
      document.getElementById('today-revenue').textContent = '₹' + Number(stats.today_revenue || 0).toLocaleString('en-IN');
      document.getElementById('week-orders').textContent   = stats.weekly_orders || 0;
      document.getElementById('week-revenue').textContent  = '₹' + Number(stats.weekly_revenue || 0).toLocaleString('en-IN');
      document.getElementById('month-orders').textContent  = stats.this_month_orders || 0;
      document.getElementById('month-revenue').textContent = '₹' + Number(stats.this_month_revenue || 0).toLocaleString('en-IN');
      document.getElementById('year-orders').textContent   = stats.this_year_orders || 0;
      document.getElementById('year-revenue').textContent  = '₹' + Number(stats.this_year_revenue || 0).toLocaleString('en-IN');
    }
  } catch (e) {
    console.error("Failed to load dashboard stats", e);
  }

  // Fetch Full Orders History
  const res = await AdminAPI._req('admin/orders/list.php?page=1&limit=200');
  if (!res.success) {
    document.getElementById('history-container').innerHTML = '<div style="padding:40px;text-align:center;color:red">Failed to load history</div>';
    return;
  }

  const orders = res.orders || [];
  if (orders.length === 0) {
    document.getElementById('history-container').innerHTML = '<div style="padding:40px;text-align:center;color:#9ca3af">No orders found</div>';
    return;
  }

  // Group by day
  const groups = {};
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);

  orders.forEach(o => {
    const d = new Date(o.created_at);
    d.setHours(0, 0, 0, 0);
    
    let groupKey = '';
    if (d.getTime() === today.getTime()) {
      groupKey = 'Today';
    } else if (d.getTime() === yesterday.getTime()) {
      groupKey = 'Yesterday';
    } else {
      groupKey = d.toLocaleString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    if (!groups[groupKey]) groups[groupKey] = { orders: [], totalRevenue: 0, sortDate: d.getTime() };
    groups[groupKey].orders.push(o);
    if (o.order_status === 'delivered') {
      groups[groupKey].totalRevenue += Number(o.total);
    }
  });

  const colors = ['bg-pink', 'bg-orange', 'bg-teal', 'bg-blue', 'bg-purple'];
  function getInitials(name) {
    if (!name) return 'U';
    const parts = name.trim().split(' ');
    if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  }

  let html = '';
  // Sort groups by date descending
  const sortedGroupKeys = Object.keys(groups).sort((a, b) => groups[b].sortDate - groups[a].sortDate);

  for (const groupKey of sortedGroupKeys) {
    const data = groups[groupKey];
    html += `
      <div class="admin-card" style="border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-bottom:32px;overflow:hidden;background:white">
        <div class="admin-card-header" style="background:linear-gradient(135deg, var(--admin-primary), #fb923c);color:white;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:none">
          <div style="display:flex;align-items:center;gap:12px">
            <i class="fas fa-calendar-day" style="font-size:1.2rem;color:var(--admin-accent)"></i>
            <div style="font-weight:800;font-size:1.15rem;text-transform:uppercase;letter-spacing:1.5px">${groupKey}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:.7rem;color:rgba(255,255,255,.8);margin-bottom:2px;text-transform:uppercase;letter-spacing:1px">Total Revenue</div>
            <div style="font-size:1.25rem;font-weight:800;color:white">₹${data.totalRevenue.toLocaleString('en-IN')}</div>
          </div>
        </div>
        <div>
    `;

    data.orders.forEach((o, index) => {
      const dObj = new Date(o.created_at);
      const dateStr = dObj.toLocaleString('en-IN', { hour: '2-digit', minute: '2-digit' });
      const initials = getInitials(o.customer_name);
      const colorCls = colors[(initials.charCodeAt(0) || 0) % colors.length];
      
      let badgeHtml = '';
      if (o.order_status === 'cancelled') {
        badgeHtml = `<span style="display:inline-flex;align-items:center;gap:4px;background:#fee2e2;color:#991b1b;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700"><i class="fas fa-times-circle"></i> Cancelled</span>`;
      } else if (o.order_status === 'delivered') {
        badgeHtml = `<span style="display:inline-flex;align-items:center;gap:4px;background:#d1fae5;color:#065f46;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700"><i class="fas fa-check-circle"></i> Delivered</span>`;
      } else {
        badgeHtml = `<span style="display:inline-flex;align-items:center;gap:4px;background:#fef3c7;color:#92400e;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700"><i class="fas fa-clock"></i> ${o.order_status.charAt(0).toUpperCase() + o.order_status.slice(1)}</span>`;
      }

      const methodText = o.payment_method ? o.payment_method.toUpperCase() : 'CASH';
      const isCancelled = o.order_status === 'cancelled';
      const amountColor = isCancelled ? '#9ca3af' : '#059669';
      const amountPrefix = isCancelled ? '' : '+ ';
      const borderBottom = index < data.orders.length - 1 ? 'border-bottom:1px solid #f0f0f0;' : '';

      html += `
          <div style="padding:16px 24px;display:flex;align-items:center;gap:16px;background:white;transition:all .2s;${borderBottom}" onmouseover="this.style.background='#f8fafc';this.style.paddingLeft='30px'" onmouseout="this.style.background='white';this.style.paddingLeft='24px'">
            <div style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.15rem;flex-shrink:0" class="${colorCls}">${initials}</div>
            <div style="flex:1">
              <div style="font-weight:600;font-size:1.05rem;color:#1f2937;margin-bottom:2px">${o.customer_name}</div>
              <div style="font-size:.8rem;color:#6b7280;margin-bottom:6px">Ordered at ${dateStr}</div>
              ${badgeHtml}
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:1.15rem;font-weight:800;color:${amountColor};margin-bottom:4px">${amountPrefix}₹${Number(o.total).toLocaleString('en-IN')}</div>
              <div style="font-size:.8rem;color:#6b7280;display:flex;align-items:center;justify-content:flex-end;gap:4px">Via ${methodText} <i class="fas fa-shield-alt" style="color:#3b82f6"></i></div>
            </div>
          </div>
      `;
    });

    html += `
        </div>
      </div>
    `;
  }

  document.getElementById('history-container').innerHTML = html;
});
</script>
</body>
</html>
