<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Profile | Admin — Sri Manikanta Pooja Stores</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --admin-sidebar: 240px; --admin-primary: #8b5a2b; --admin-accent: #fb923c; }
    *{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5}
    .admin-layout{display:flex;min-height:100vh}
    .admin-sidebar {width:var(--admin-sidebar);background: var(--admin-primary);color: #fffdf5;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
    .admin-nav{padding:12px 0}
    .admin-nav-label{padding:10px 16px 4px;font-size:.6rem;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.3)}
    .admin-nav-link {display:flex;align-items:center;gap:10px;padding:11px 16px;color: #fcece0;text-decoration:none;font-size:.85rem;border-left:3px solid transparent;transition:all .2s}
    .admin-nav-link:hover, .admin-nav-link.active { background: #7a4b22; color: white;border-left-color:var(--admin-accent)}
    .admin-nav-link .fa{width:16px;font-size:13px}
    .admin-main{margin-left:var(--admin-sidebar);flex:1}
    .admin-topbar{background:white;padding:14px 24px;display:flex;align-items:center;gap:15px;box-shadow:0 2px 8px rgba(0,0,0,.06);positi
  } else {
    html += orders.map(o => `
      <tr>
        <td style="font-weight:700;color:var(--admin-primary)">${o.order_number}</td>
        <td style="color:#6b7280">
          <div>${new Date(o.created_at).toLocaleDateString('en-IN')}</div>
          <div style="font-size:0.7rem;margin-top:2px;color:#9ca3af">${new Date(o.created_at).toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit'})}</div>
        </td>
        <td>
          <div style="font-size:0.75rem; color:#4b5563; line-height:1.6; max-width: 250px">
            ${o.items && o.items.length > 0 
              ? o.items.map(i => `<div><strong style="color:var(--admin-primary)">${i.qty}x</strong> ${i.name} <span style="color:#9ca3af;font-size:0.7rem">— ₹${Number(i.price).toLocaleString('en-IN')}</span></div>`).join('')
              : `${o.item_count || 0} item(s)`
            }
          </div>
        </td>
        <td style="font-weight:700">₹${Number(o.total).toLocaleString('en-IN')}</td>
        <td>
          <span style="font-size:.7rem;font-weight:700;color:#6b7280;text-transform:uppercase">${o.payment_method}</span><br>
          <span style="font-size:.65rem;color:${o.payment_status==='paid'||o.payment_status==='verified'?'#059669':'#d97706'}">${o.payment_status}</span>
        </td>
        <td><span class="badge-status badge-${o.order_status}">${o.order_status}</span></td>
        <td><a href="orders.html?search=${encodeURIComponent(o.order_number)}" class="btn-view-order">View Details</a></td>
      </tr>
    `).join('');
  }

  html += `
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('content-area').innerHTML = html;
}
</script>
</body>
</html>
