<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <!-- PWA Theme Color -->
  <meta name="theme-color" content="#7B1A1A">
  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sri Manikanta">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- Windows tile -->
  <meta name="msapplication-TileColor" content="#7B1A1A">
  <meta name="msapplication-TileImage" content="icons/icon-192.png">
  <title>Create Account | Sri Manikanta Pooja Stores</title>
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="css/style.min.css?v=35">
  <link rel="stylesheet" href="css/components.min.css?v=35">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></noscript>
  <style>
    .auth-page { min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--maroon) 0%,#3a0a0a 50%,#1a0000 100%);padding:calc(var(--header-h) + 40px) 20px 40px; }
    .auth-card { background:white;border-radius:20px;overflow:hidden;width:100%;max-width:460px;box-shadow:0 25px 60px rgba(0,0,0,0.4); }
    .auth-header { background:linear-gradient(135deg,var(--maroon),#5a1010);padding:28px;text-align:center; }
    .auth-header .logo { font-size:40px;margin-bottom:6px; }
    .auth-header h1 { color:var(--gold);font-family:var(--font-heading);font-size:1.3rem;margin:0; }
    .auth-header p { color:rgba(255,255,255,0.7);font-size:0.8rem;margin:4px 0 0; }
    .auth-body { padding:28px; }
    .auth-tabs { display:flex;margin-bottom:24px;border-bottom:2px solid var(--border); }
    .auth-tab { flex:1;padding:11px;text-align:center;cursor:pointer;font-weight:600;color:var(--text-muted);transition:all 0.2s;text-decoration:none;font-size:0.9rem; }
    .auth-tab.active { color:var(--maroon);border-bottom:2px solid var(--maroon);margin-bottom:-2px; }
    .form-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
    .form-group { margin-bottom:16px; }
    .form-label { display:block;font-weight:600;font-size:0.82rem;color:var(--maroon);margin-bottom:5px; }
    .form-control { width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:0.9rem;transition:border-color 0.2s;box-sizing:border-box; }
    .form-control:focus { outline:none;border-color:var(--saffron);box-shadow:0 0 0 3px rgba(255,119,34,0.15); }
    .input-group { position:relative; }
    .input-icon { position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px; }
    .input-group .form-control { padding-left:36px; }
    .input-eye { position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);cursor:pointer;font-size:13px; }
    .btn-auth { width:100%;padding:13px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;margin-top:6px; }
    .btn-auth-primary { background:linear-gradient(135deg,var(--saffron),#e86b00);color:white; }
    .btn-auth-primary:hover { transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,119,34,0.4); }
    .btn-auth-primary:disabled { opacity:0.7;transform:none;cursor:not-allowed; }
    .auth-alert { padding:10px 14px;border-radius:8px;font-size:0.875rem;margin-bottom:14px;display:none; }
    .auth-alert.error { background:#fef2f2;color:#b91c1c;border:1px solid #fecaca; }
    .auth-alert.success { background:#f0fdf4;color:#166534;border:1px solid #bbf7d0; }
    .password-strength { height:4px;border-radius:2px;background:#e5e7eb;margin-top:6px;overflow:hidden; }
    .password-strength-fill { height:100%;border-radius:2px;transition:all 0.3s;width:0%; }
    .back-to-shop { display:flex;align-items:center;gap:8px;justify-content:center;margin-top:16px;color:var(--text-muted);font-size:0.83rem;text-decoration:none; }
    .back-to-shop:hover { color:var(--saffron); }
    .terms-text { font-size:0.75rem;color:var(--text-muted);text-align:center;margin-top:10px; }
    .terms-text a { color:var(--saffron); }
    @media(max-width:400px) { .form-row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<header id="site-header"></header>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">🕉️</div>
      <h1>Sri Manikanta Pooja Stores</h1>
      <p>Create your account to start shopping</p>
    </div>
    <div class="auth-body">
      <div class="auth-tabs">
        <a href="login.html" class="auth-tab">Login</a>
        <a href="register.html" class="auth-tab active">Register</a>
      </div>

      <div class="auth-alert" id="auth-alert"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="full_name">Full Name *</label>
          <div class="input-group">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="full_name" class="form-control" placeholder="Your full name" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="mobile">Mobile Number *</label>
            <div class="input-group">
              <i class="fas fa-mobile-alt input-icon"></i>
              <input type="tel" id="mobile" class="form-control" placeholder="10-digit number" maxlength="10" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email Address *</label>
            <div class="input-group">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" id="email" class="form-control" placeholder="Used for login" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password *</label>
          <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="form-control" placeholder="Minimum 8 characters" oninput="checkStrength(this.value)" required>
            <i class="fas fa-eye input-eye" onclick="togglePassword('password', this)"></i>
          </div>
          <div class="password-strength">
            <div class="password-strength-fill" id="pwd-strength-fill"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm Password *</label>
          <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="confirm_password" class="form-control" placeholder="Re-enter your password" required>
            <i class="fas fa-eye input-eye" onclick="togglePassword('confirm_password', this)"></i>
          </div>
        </div>

        <button type="submit" class="btn-auth btn-auth-primary" id="register-btn">
          <i class="fas fa-user-plus"></i> Create My Account
        </button>
      </form>

      <p class="terms-text">By registering, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
      <p style="text-align:center;font-size:0.875rem;color:var(--text-muted);margin-top:12px">
        Already have an account? <a href="login.html" style="color:var(--saffron);font-weight:600">Login here</a>
      </p>
      <a href="index.html" class="back-to-shop"><i class="fas fa-arrow-left"></i> Continue browsing without account</a>
    </div>
  </div>
</div>

<footer id="site-footer"></footer>
<div id="floating-actions"></div>

<script src="js/products.min.js?v=35" defer></script>
<script src="js/main.min.js?v=35" defer></script>
<script src="js/auth.min.js?v=36" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // If already logged in, skip registration
    if (AuthManager.isLoggedIn()) {
      const redirect = new URLSearchParams(window.location.search).get('redirect');
      const target = redirect ? decodeURIComponent(redirect) : 'cart.html';
      window.location.replace(target);
      return;
    }

    // Carry ?redirect= param to the Login tab link
    const redirectParam = new URLSearchParams(window.location.search).get('redirect');
    if (redirectParam) {
      const loginTab = document.querySelector('a[href="login.html"]');
      if (loginTab) loginTab.href = 'login.html?redirect=' + redirectParam;
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fullName = document.getElementById('full_name').value.trim();
      const mobile   = document.getElementById('mobile').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm_password').value;
      const btn      = document.getElementById('register-btn');

      if (!fullName || fullName.length < 2) { showAuthAlert('Please enter your full name.', 'error'); return; }
      if (!/^[6-9]\d{9}$/.test(mobile)) { showAuthAlert('Please enter a valid 10-digit mobile number.', 'error'); return; }
      if (!email || !email.includes('@')) { showAuthAlert('Please enter a valid email address. You will use this to login.', 'error'); return; }
      if (password.length < 8) { showAuthAlert('Password must be at least 8 characters.', 'error'); return; }
      if (password !== confirm) { showAuthAlert('Passwords do not match.', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

      const result = await AuthManager.register({ full_name: fullName, mobile, email, password });
      if (result.success) {
        showAuthAlert('Account created! Welcome to SMPS!', 'success');
        // Redirect back to where they came from (e.g. checkout)
        const redirectRaw = new URLSearchParams(window.location.search).get('redirect');
        const target = redirectRaw ? decodeURIComponent(redirectRaw) : 'cart.html';
        setTimeout(() => { window.location.replace(target); }, 800);
      } else {
        showAuthAlert(result.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create My Account';
      }
    });
  });

  function showAuthAlert(msg, type) {
    const el = document.getElementById('auth-alert');
    el.textContent = msg;
    el.className = `auth-alert ${type}`;
    el.style.display = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function togglePassword(fieldId, icon) {
    const field = document.getElementById(fieldId);
    field.type = field.type === 'password' ? 'text' : 'password';
    icon.className = field.type === 'password' ? 'fas fa-eye input-eye' : 'fas fa-eye-slash input-eye';
  }

  function checkStrength(pwd) {
    const fill = document.getElementById('pwd-strength-fill');
    let strength = 0;
    if (pwd.length >= 8) strength++;
    if (/[A-Z]/.test(pwd)) strength++;
    if (/[0-9]/.test(pwd)) strength++;
    if (/[^A-Za-z0-9]/.test(pwd)) strength++;
    const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
    const widths  = ['25%','50%','75%','100%'];
    fill.style.width = strength > 0 ? widths[strength - 1] : '0%';
    fill.style.background = strength > 0 ? colors[strength - 1] : 'transparent';
  }
</script>
</body>
</html>
