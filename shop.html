<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <!-- PWA Theme Color -->
  <meta name="theme-color" content="#7B1A1A">
  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sri Manikanta">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- Windows tile -->
  <meta name="msapplication-TileColor" content="#7B1A1A">
  <meta name="msapplication-TileImage" content="icons/icon-192.png">
  <title>Shop All Pooja Items | Sri Manikanta Pooja Stores &rdquo;“ Hyderabad</title>
  <meta name="description" content="Browse 500+ pooja products &rdquo;” agarbatti, camphor, kumkum, haldi, diyas, idols, thali sets, malas, festival kits and wedding samagri at Sri Manikanta Pooja Stores.">
  <meta property="og:title" content="Shop Pooja Items | Sri Manikanta Pooja Stores">
  <meta property="og:description" content="Browse 500+ premium quality Hindu pooja products. Agarbatti, camphor, diyas, idols, festival kits and more.">
  <meta property="og:url" content="https://manikantapoojastore.com/shop.html">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://manikantapoojastore.com/shop.html">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="css/style.min.css?v=35">
  <link rel="stylesheet" href="css/components.min.css?v=35">
  <link rel="stylesheet" href="css/shop.min.css?v=35">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></noscript></noscript>
</head>
<body>

  <header id="site-header"></header>

  <!-- Page Banner -->
  <div class="page-banner">
    <div class="container">
      <h1>Our Product Collection</h1>
      <p>Pure • Authentic • Sacred</p>
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <i class="fas fa-chevron-right"></i>
        <span>Shop</span>
      </div>
    </div>
  </div>

  <!-- Shop Content -->
  <main style="padding-bottom:var(--sp-16)">
    <div class="container">
      <div class="shop-layout">

        <!-- Sidebar -->
        <aside class="shop-sidebar">
          <div class="sidebar-card">
            <div class="sidebar-title"><i class="fas fa-filter"></i> Categories</div>
            <div class="filter-list" id="category-filter-list">
              <!-- Injected by shop.js -->
            </div>
          </div>
          <div class="sidebar-card">
            <div class="sidebar-title"><i class="fas fa-rupee-sign"></i> Price Range</div>
            <input type="range" id="price-slider" min="0" max="2000" value="2000" step="50"
              oninput="maxPrice=+this.value;document.getElementById('price-max').value=maxPrice;applyFilters()">
            <div class="price-range-inputs">
              <input type="number" class="price-input" id="price-min" placeholder="Min &#8377;" value="0" min="0"
                onchange="minPrice=+this.value;applyFilters()">
              <input type="number" class="price-input" id="price-max" placeholder="Max &#8377;" value="2000" max="5000"
                onchange="maxPrice=+this.value;applyFilters()">
            </div>
          </div>
          <div class="sidebar-card">
            <div class="sidebar-title"><i class="fas fa-tag"></i> Badges</div>
            <div class="filter-list">
              <div class="filter-item badge-filter-item active" data-badge="" onclick="filterByBadge(null)"><div class="filter-item-left">🕉️ All Items</div></div>
              <div class="filter-item badge-filter-item" data-badge="popular" onclick="filterByBadge('popular')"><div class="filter-item-left">⭐ Popular</div></div>
              <div class="filter-item badge-filter-item" data-badge="new" onclick="filterByBadge('new')"><div class="filter-item-left">🆕 New Arrivals</div></div>
              <div class="filter-item badge-filter-item" data-badge="sale" onclick="filterByBadge('sale')"><div class="filter-item-left">🔥 On Sale</div></div>
            </div>
          </div>
        </aside>

        <!-- Main Content -->
        <div class="shop-content">
          <!-- Search bar -->
          <div class="shop-search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="shop-search-input" placeholder="Search agarbatti, diyas, kumkum..." aria-label="Search products">
          </div>

          <!-- Toolbar -->
          <div class="shop-toolbar">
            <div id="result-count" class="shop-result-count">Loading products...</div>
            <div class="shop-toolbar-right">
              <button class="btn btn-outline btn-sm" id="filter-toggle" style="display:none">
                <i class="fas fa-filter"></i> Filter
              </button>
              <select id="sort-select" class="sort-select" aria-label="Sort products">
                <option value="popular">Most Popular</option>
                <option value="rating">Highest Rated</option>
                <option value="new">New Arrivals</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
              </select>
              <div class="view-toggle">
                <button class="view-btn active" id="view-grid" title="Grid view"><i class="fas fa-th"></i></button>
                <button class="view-btn" id="view-list" title="List view"><i class="fas fa-list"></i></button>
              </div>
            </div>
          </div>

          <!-- Products Grid -->
          <div class="shop-grid" id="shop-grid">
            <!-- Injected by shop.js -->
          </div>

          <!-- Pagination -->
          <div class="pagination" id="pagination"></div>
        </div>

      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <div id="floating-actions"></div>

  <script src="js/products.min.js?v=35" defer></script>
  <script src="js/auth.min.js" defer></script>
<script src="js/main.min.js?v=35" defer></script>
  <script src="js/shop.min.js?v=35" defer></script>
  <script>
    let badgeFilter = null;
    function filterByBadge(badge) {
      badgeFilter = badge;
      currentPage = 1;
      // Update active state on badge filter items
      document.querySelectorAll('.badge-filter-item').forEach(el => {
        el.classList.toggle('active', el.dataset.badge === (badge || ''));
      });
      applyFilters();
    }
    // Show filter toggle on mobile
    if (window.innerWidth < 768) {
      document.getElementById('filter-toggle').style.display = 'flex';
    }
  </script>
</body>
</html>
