<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Sri Manikanta Pooja Stores</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--sidebar-w:240px}*{box-sizing:border-box}
    body{margin:0;font-family:var(--font-body);background:#f8f4f0}
    .dash-layout{display:flex;min-height:100vh}
    .dash-sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,var(--maroon) 0%,#3a0a0a 100%);color:white;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
    .dash-sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
    .dash-sidebar-logo .emoji{font-size:32px}
    .dash-sidebar-logo h2{color:var(--gold);font-size:.85rem;margin:6px 0 2px;font-family:var(--font-heading)}
    .dash-sidebar-logo p{color:rgba(255,255,255,.5);font-size:.7rem;margin:0}
    .dash-nav{padding:16px 0}
    .dash-nav-section{padding:8px 20px 4px;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35)}
    .dash-nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;color:rgba(255,255,255,.75);text-decoration:none;font-size:.875rem;transition:all .2s;border-left:3px solid transparent}
    .dash-nav-item:hover,.dash-nav-item.active{background:rgba(255,255,255,.1);color:white;border-left-color:var(--saffron)}
    .dash-nav-item .icon{width:18px;text-align:center}
    .dash-main{margin-left:var(--sidebar-w);flex:1}
    .dash-topbar{background:white;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:50}
    .dash-topbar-title{font-size:1.2rem;font-weight:700;color:var(--maroon);font-family:var(--font-heading)}
    .user-avatar-lg{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--saffron),var(--maroon));display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:2rem;flex-shrink:0}
    .user-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--saffron),var(--maroon));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.875rem}
    .dash-content{padding:28px;max-width:700px}
    /* Profile header */
    .profile-header{background:linear-gradient(135deg,var(--maroon),#5a1010);border-radius:16px;padding:28px;color:white;display:flex;align-items:center;gap:20px;margin-bottom:24px}
    .profile-info h2{color:var(--gold);font-family:var(--font-heading);margin:0 0 4px}
    .profile-info p{color:rgba(255,255,255,.6);margin:0;font-size:.875rem}
    .profile-info .mobile-badge{display:inline-block;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px;font-size:.8rem;margin-top:8px}
    /* Cards */
    .profile-card{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px}
    .profile-card h3{font-family:var(--font-heading);color:var(--maroon);margin:0 0 20px;font-size:1rem;display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:2px solid var(--border-light)}
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-weight:600;font-size:.82rem;color:var(--maroon);margin-bottom:5px}
    .form-control{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;transition:border-color .2s;box-sizing:border-box}
    .form-control:focus{outline:none;border-color:var(--saffron);box-shadow:0 0 0 3px rgba(255,119,34,.15)}
    .form-control:disabled{background:#f9f9f9;color:var(--text-muted);cursor:not-allowed}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .btn-save{padding:12px 28px;background:linear-gradient(135deg,var(--saffron),#e86b00);color:white;border:none;border-radius:10px;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .3s}
    .btn-save:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,119,34,.4)}
    .btn-save:disabled{opacity:.7;transform:none;cursor:not-allowed}
    .alert{padding:10px 14px;border-radius:8px;font-size:.875rem;margin-bottom:14px;display:none}
    .alert-success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
    .alert-error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .change-pwd-btn{background:none;border:1.5px solid var(--maroon);color:var(--maroon);padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;transition:all .2s;font-size:.875rem}
    .change-pwd-btn:hover{background:var(--maroon);color:white}
    .mobile-menu-btn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--maroon)}
    @media(max-width:768px){.dash-sidebar{transform:translateX(-100%)}.dash-sidebar.open{transform:translateX(0)}.dash-main{margin-left:0}.mobile-menu-btn{display:block}.dash-content{padding:16px}.form-row{grid-template-columns:1fr}.profile-header{flex-direction:column;text-align:center}}
  </style>
</head>
<body>
<div class="dash-layout">
  <aside class="dash-sidebar" id="dash-sidebar">
    <div class="dash-sidebar-logo"><div class="emoji">🕉️</div><h2>Sri Manikanta</h2><p>My Account</p></div>
    <nav class="dash-nav">
      <div class="dash-nav-section">Main</div>
      <a href="index.html" class="dash-nav-item"><span class="icon"><i class="fas fa-home"></i></span> Dashboard</a>
      <a href="orders.html" class="dash-nav-item"><span class="icon"><i class="fas fa-shopping-bag"></i></span> My Orders</a>
      <div class="dash-nav-section">Account</div>
      <a href="profile.html" class="dash-nav-item active"><span class="icon"><i class="fas fa-user"></i></span> My Profile</a>
      <a href="addresses.html" class="dash-nav-item"><span class="icon"><i class="fas fa-map-marker-alt"></i></span> Saved Addresses</a>
      <div class="dash-nav-section">Store</div>
      <a href="../shop.html" class="dash-nav-item"><span class="icon"><i class="fas fa-store"></i></span> Browse Products</a>
      <a href="../cart.html" class="dash-nav-item"><span class="icon"><i class="fas fa-shopping-cart"></i></span> My Cart</a>
      <div style="padding-top:20px"><div class="dash-nav-item" style="cursor:pointer;color:rgba(255,100,100,.8)" onclick="AuthManager.logout()"><span class="icon"><i class="fas fa-sign-out-alt"></i></span> Logout</div></div>
    </nav>
  </aside>

  <main class="dash-main">
    <div class="dash-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="mobile-menu-btn" onclick="document.getElementById('dash-sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
        <div class="dash-topbar-title">My Profile</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="user-avatar" id="user-initial">U</div>
        <span id="user-name-top" style="font-weight:600;font-size:.875rem;color:var(--maroon)"></span>
      </div>
    </div>

    <div class="dash-content">
      <!-- Profile header -->
      <div class="profile-header">
        <div class="user-avatar-lg" id="avatar-lg">U</div>
        <div class="profile-info">
          <h2 id="profile-fullname">Loading...</h2>
          <p>Customer since 2025</p>
          <span class="mobile-badge" id="profile-mobile">...</span>
        </div>
      </div>

      <!-- Edit profile form -->
      <div class="profile-card">
        <h3><i class="fas fa-user-edit"></i> Personal Information</h3>
        <div class="alert alert-success" id="profile-success"></div>
        <div class="alert alert-error" id="profile-error"></div>
        <form id="profile-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" id="full_name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="form-group">
              <label class="form-label">Mobile Number</label>
              <input type="tel" id="mobile_display" class="form-control" disabled placeholder="">
              <small style="color:var(--text-muted);font-size:.75rem">Mobile number cannot be changed</small>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="For order updates (optional)">
          </div>
          <button type="submit" class="btn-save" id="save-profile-btn">
            <i class="fas fa-save"></i> Save Changes
          </button>
        </form>
      </div>

      <!-- Change password -->
      <div class="profile-card">
        <h3><i class="fas fa-lock"></i> Change Password</h3>
        <div class="alert alert-success" id="pwd-success"></div>
        <div class="alert alert-error" id="pwd-error"></div>
        <form id="change-pwd-form">
          <div class="form-group">
            <label class="form-label">Current Password</label>
            <input type="password" id="current_password" class="form-control" placeholder="Enter current password" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">New Password</label>
              <input type="password" id="new_password" class="form-control" placeholder="Min 8 characters" required>
            </div>
            <div class="form-group">
              <label class="form-label">Confirm New Password</label>
              <input type="password" id="confirm_password" class="form-control" placeholder="Re-enter password" required>
            </div>
          </div>
          <button type="submit" class="change-pwd-btn" id="change-pwd-btn">
            <i class="fas fa-key"></i> Update Password
          </button>
        </form>
      </div>

      <!-- Danger zone -->
      <div class="profile-card" style="border:1.5px solid #fee2e2">
        <h3 style="color:#991b1b"><i class="fas fa-exclamation-triangle"></i> Account</h3>
        <button class="change-pwd-btn" style="border-color:#ef4444;color:#ef4444" onclick="AuthManager.logout()">
          <i class="fas fa-sign-out-alt"></i> Logout from this device
        </button>
      </div>
    </div>
  </main>
</div>

<script>document.write('<script src="../js/products.js?t=' + Date.now() + '"><\/script>');</script>
<script src="../js/main.js?v=2"></script>
<script src="../js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!AuthManager.requireLogin()) return;
  const user = AuthManager.getUser();

  // Populate header
  document.getElementById('user-name-top').textContent  = user.full_name.split(' ')[0];
  document.getElementById('user-initial').textContent   = user.full_name.charAt(0).toUpperCase();
  document.getElementById('avatar-lg').textContent      = user.full_name.charAt(0).toUpperCase();
  document.getElementById('profile-fullname').textContent = user.full_name;
  document.getElementById('profile-mobile').textContent   = '+91 ' + user.mobile;

  // Load full profile
  const data = await DashboardAPI.getProfile();
  if (data.success) {
    const u = data.user;
    document.getElementById('full_name').value     = u.full_name;
    document.getElementById('mobile_display').value = u.mobile;
    document.getElementById('email').value          = u.email || '';
  }

  // Save profile
  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('save-profile-btn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    clearAlerts();

    const result = await DashboardAPI.updateProfile({
      full_name: document.getElementById('full_name').value.trim(),
      email: document.getElementById('email').value.trim(),
    });

    if (result.success) {
      showAlert('profile-success', 'Profile updated successfully! ✅');
      document.getElementById('profile-fullname').textContent = document.getElementById('full_name').value;
      // Update stored user
      const u = AuthManager.getUser();
      u.full_name = document.getElementById('full_name').value.trim();
      localStorage.setItem('smps_user', JSON.stringify(u));
    } else {
      showAlert('profile-error', result.message);
    }
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
  });

  // Change password (calls forgot password OTP flow for simplicity)
  document.getElementById('change-pwd-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlerts();
    const newPwd  = document.getElementById('new_password').value;
    const confirm = document.getElementById('confirm_password').value;
    if (newPwd.length < 8) { showAlert('pwd-error', 'Password must be at least 8 characters.'); return; }
    if (newPwd !== confirm) { showAlert('pwd-error', 'Passwords do not match.'); return; }
    // TODO: implement change-password API endpoint
    showAlert('pwd-success', 'Password change feature: Use "Forgot Password" on the login page to reset your password via OTP.');
  });
});

function showAlert(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}
function clearAlerts() {
  ['profile-success','profile-error','pwd-success','pwd-error'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}
</script>
</body>
</html>
